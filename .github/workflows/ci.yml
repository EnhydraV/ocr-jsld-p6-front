on:
  push:
    # branches: obligatoire ici. Sans elle, ne définir QUE tags-ignore restreint
    # le déclenchement aux seuls push de tags et exclut tous les push de branches
    # (dont main) — cf doc GitHub Actions sur on.push.branches/tags.
    branches:
      - '**'
    # semantic-release pousse un tag vX.Y.Z après release : sans ça, ce push
    # retriggerait tout le workflow une seconde fois pour rien.
    tags-ignore:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 24.x
      - name: Run tests
        run: ./run-tests.sh
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-report
          path: test-results/junit.xml

  release:
    needs: test
    if: github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 24.x

      - name: Install dependencies
        run: npm ci

      - name: Release
        id: semantic
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push-image:
    needs: [test, release]
    # needs.release peut être "skipped" (hors main) : un needs sur un job skipped
    # skip la suite par défaut, d'où ce if explicite pour ne dépendre que de test.
    if: ${{ !cancelled() && needs.test.result == 'success' }}

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 #v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 #v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Tag image with the semantic release version
        if: needs.release.outputs.new_release_published == 'true'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.release.outputs.new_release_version }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}